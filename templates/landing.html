<h2>Welcome to the Score App</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="post">
  Enter Password to Add/Modify Match Results: 
  <input type="password" name="password">
  <button type="submit">Submit</button>
</form>

<p>Or <a href="{{ url_for('view_results') }}">view previous results</a> without a password.</p>
