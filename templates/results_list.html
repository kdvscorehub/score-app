<h2>Previous Match Results</h2>
<table border="1">
  <tr>
    <th>First Name</th>
    <th>Last Name</th>
    <th>Score</th>
    <th>X Count</th>
    <th>Class</th>
  </tr>
  {% for s in students %}
  <tr>
    <td>{{ s[0] }}</td>
    <td>{{ s[1] }}</td>
    <td>{{ s[2] }}</td>
    <td>{{ s[3] }}</td>
    <td>{{ s[4] }}</td>
  </tr>
  {% endfor %}
</table>

<p><a href="{{ url_for('landing') }}">Back to Home</a></p>
